<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dumpster Crunchers · Commercial Waste Hauling — Denver Metro</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --dark: #111111;
      --card: #181818;
      --border: #2a2a2a;
      --orange: #f97316;
      --orange-dark: #c2540a;
      --white: #f5f5f5;
      --muted: #888;
      --green: #22c55e;
      --blue: #39b8ff;
      --blue-dim: rgba(57,184,255,0.12);
      --blue-border: rgba(57,184,255,0.3);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    nav a.logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--white);
      text-decoration: none;
    }
    nav a.logo span { color: var(--orange); }
    nav .nav-cta {
      background: var(--orange);
      color: var(--black);
      font-weight: 700;
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s;
    }
    nav .nav-cta:hover { background: #fb923c; }

    /* HERO */
    .hero {
      padding: 80px 24px 60px;
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
    }
    .hero .eyebrow {
      display: inline-block;
      background: var(--blue-dim);
      border: 1px solid var(--blue-border);
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 28px;
    }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 10vw, 88px);
      line-height: 0.95;
      letter-spacing: 1px;
      margin-bottom: 24px;
      color: var(--white);
    }
    .hero h1 em {
      font-style: normal;
      color: var(--blue);
    }
    .hero p {
      font-size: 18px;
      color: #aaa;
      max-width: 560px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }
    .hero-ctas {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-primary {
      background: var(--orange);
      color: var(--black);
      font-weight: 700;
      font-size: 16px;
      padding: 16px 32px;
      border-radius: 8px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:hover { background: #fb923c; transform: translateY(-1px); }
    .btn-secondary {
      background: transparent;
      color: var(--white);
      font-weight: 600;
      font-size: 16px;
      padding: 16px 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-secondary:hover { border-color: var(--blue); background: rgba(57,184,255,0.06); }

    /* TRUST BAR */
    .trust-bar {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      flex-wrap: wrap;
      background: #0a1520;
    }
    .trust-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #888;
      font-weight: 500;
    }
    .trust-item .icon { font-size: 18px; color: var(--blue); }

    /* SECTION */
    section { padding: 72px 24px; }
    .section-inner { max-width: 900px; margin: 0 auto; }
    .section-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 16px;
    }
    h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 6vw, 56px);
      letter-spacing: 0.5px;
      line-height: 1.05;
      margin-bottom: 16px;
    }
    .subtitle {
      font-size: 17px;
      color: #888;
      max-width: 560px;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    /* WHY CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--blue); }
    .card .icon { font-size: 28px; margin-bottom: 16px; }
    .card h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; color: var(--white); }
    .card p { font-size: 14px; color: #888; line-height: 1.6; }

    /* HOW IT WORKS */
    .steps { display: flex; flex-direction: column; gap: 0; }
    .step {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 20px;
      align-items: flex-start;
      padding: 28px 0;
      border-bottom: 1px solid rgba(57,184,255,0.1);
    }
    .step:last-child { border-bottom: none; }
    .step-num {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--blue-dim);
      border: 1px solid var(--blue-border);
      color: var(--blue);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; color: var(--white); }
    .step p { font-size: 14px; color: #888; line-height: 1.6; }

    /* LEAD FORM */
    .form-section {
      background: var(--dark);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .form-wrap {
      max-width: 640px;
      margin: 0 auto;
      text-align: center;
    }
    .form-wrap h2 { margin-bottom: 8px; }
